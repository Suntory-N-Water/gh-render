  <rect x="916" y="118" width="60" height="18" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="946" y="131" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Go</text>
  <rect x="700" y="148" width="380" height="10" rx="3" fill="#f1f5f9"/>
  <rect x="700" y="166" width="300" height="10" rx="3" fill="#f1f5f9"/>
  <rect x="700" y="216" width="70" height="24" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="735" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">★ 2.4k</text>

  <!-- カード2 -->
  <rect x="680" y="278" width="460" height="160" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="700" y="298" width="180" height="14" rx="4" fill="#e2e8f0"/>
  <rect x="916" y="296" width="44" height="18" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="938" y="309" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Rust</text>
  <rect x="700" y="326" width="380" height="10" rx="3" fill="#f1f5f9"/>
  <rect x="700" y="344" width="260" height="10" rx="3" fill="#f1f5f9"/>
  <rect x="700" y="394" width="70" height="24" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="735" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">★ 1.8k</text>

  <!-- カード3 (下部、少し切れる) -->
  <rect x="680" y="456" width="460" height="160" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="700" y="476" width="220" height="14" rx="4" fill="#e2e8f0"/>
  <rect x="916" y="474" width="60" height="18" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="946" y="487" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Python</text>
  <rect x="700" y="504" width="380" height="10" rx="3" fill="#f1f5f9"/>
  <rect x="700" y="522" width="320" height="10" rx="3" fill="#f1f5f9"/>

  <!-- 下部フェード -->
  <defs>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="640" y="500" width="560" height="130" fill="url(#fadeBottom)"/>

  <!-- 下部ボーダーライン -->
  <rect width="1200" height="1" y="629" fill="#e2e8f0"/>
