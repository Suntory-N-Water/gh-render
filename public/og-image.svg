<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- 上部ボーダーライン -->
  <rect width="1200" height="1" y="0" fill="#e2e8f0"/>

  <!-- ヘッダー風エリア -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <rect width="1200" height="1" y="64" fill="#e2e8f0"/>

  <!-- ヘッダー: アイコン + タイトル -->
  <!-- TrendingUpアイコン (lucide風) -->
  <polyline points="52,38 62,26 69,32 82,18" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="74,18 82,18 82,26" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="96" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#0f172a">GitHub Trending</text>

  <!-- メインコンテンツエリア -->
  <!-- 左側: メインメッセージ -->
  <text x="80" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#0f172a">GitHub Trending</text>
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b">毎日のトレンドリポジトリを収集・AI要約して</text>
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b">一覧表示するサービス</text>

  <!-- 機能タグ -->
  <rect x="80" y="345" width="136" height="36" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="148" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle">言語フィルタ</text>

  <rect x="228" y="345" width="112" height="36" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="284" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle">全文検索</text>

  <rect x="352" y="345" width="112" height="36" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle">AI要約</text>

  <!-- 右側: カードのモックアップ -->
